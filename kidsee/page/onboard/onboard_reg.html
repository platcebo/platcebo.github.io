<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kidsee</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav__container">
            <a href="#" class="nav__logo">
                <img src="../../img/logo.svg" alt="">
            </a>
        </div>
    </nav>
    <section class="onboard">
        <div class="container container__two">
            <div class="onboard__wrapper">
                <h1>Создание профиля ребенка</h1>
                <p>Контент и категории будут автоматически подстраиваться под его возраст</p>
                <div class="onboard__slider">
                    <div class="onboard__slide">
                       <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide_active">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide_center">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide_active">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                </div>
                <div class="onboard__arrow">
                    <a href="#" class="onboard__arrow_prev">
                        <img src="../../img/slider_arrow.svg" alt="">
                    </a>
                    <a href="#" class="onboard__arrow_next">
                        <img src="../../img/slider_arrow.svg" alt="">
                    </a>
                </div>
                <div class="onboard__name">
                    <input type="text" placeholder="имя ребенка">
                    <input type="text" placeholder="возраст">
                </div>
                <div class="onboard__time">
                    <h2>ограничение времени в день</h2>
                    <p>установите таймер для ребенка, чтобы следить за его временем в kidsee. Или оставьте поле пустым, тогда время будет не ограничено</p>
                    <div class="">
                        <input type="text" class="onboard__hour" placeholder="__" maxlength="1">
                        <p>ч</p>
                        <input type="text" class="onboard__min" placeholder="__ __" maxlength="2">
                        <p>мин</p>
                    </div>
                </div>
                <div class="onboard__link_btn">
                    <button class="button__blue">создать</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
