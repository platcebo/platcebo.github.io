<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kidsee</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav__container">
            <a href="#" class="nav__logo">
                <img src="../../img/logo.svg" alt="">
            </a>
            <ul class="nav__list">
                <li>
                    <a href="#">
                        <img src="../../img/nav_1.svg" alt="">
                        <p>все</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../img/nav_2.svg" alt="">
                        <p>влоги</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../img/nav_3.svg" alt="">
                        <p>мульты</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../img/nav_4.svg" alt="">
                        <p>обучение</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../img/nav_5.svg" alt="">
                        <p>кино</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../img/nav_6.svg" alt="">
                        <p>музыка</p>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../img/nav_7.svg" alt="">
                        <p>другое</p>
                    </a>
                </li>
            </ul>
            <div class="nav__search">
                <a href="#">
                    <img src="../../img/nav_search.svg" alt="">
                </a>
                <a href="#">
                    <img src="../../img/nav_shop.svg" alt="">
                </a>
            </div>
        </div>
    </nav>
    <main class="main container">
        <section class="nav-fix">
            <ul>
                <li class="">
                    <img src="../../img/nav-fix_1.svg" alt="">
                    <p>Главная</p>
                </li>
                <li class="">
                    <img src="../../img/nav-fix_2.svg" alt="">
                    <p>Избранное</p>
                </li>
                <li class="">
                    <img src="../../img/nav-fix_3.svg" alt="">
                    <p>История</p>
                </li>
            </ul>
            <a href="#" class="nav-fix__movie">снять сериал</a>
            <a href="#" class="nav-fix__pers active">
                <img src="../../img/nav-fix_pers.svg" alt="">
                <p>александр</p>
                <img src="../../img/nav-fix_arrow.svg" alt="">
            </a>
        </section>
        <section class="setting-child">
            <div class="setting-child__baner">
                <img src="../../img/setting-child.svg" alt="">
                <div class="">
                    <a href="#">загрузи свой сериал</a>
                    <h1>стань звездой kidsee</h1>
                </div>
                <button class="button__blue">загрузить</button>
            </div>
            <div class="setting-child__wrapper">
                <h2>Настройки профиля</h2>
                <div class="onboard__slider">
                    <div class="onboard__slide">
                       <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide_active">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide_center">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide_active">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                    <div class="onboard__slide">
                        <img src="../../img/onboard_slide.svg" alt=""> 
                    </div>
                </div>
                <div class="onboard__arrow">
                    <a href="#" class="onboard__arrow_prev">
                        <img src="../../img/slider_arrow.svg" alt="">
                    </a>
                    <a href="#" class="onboard__arrow_next">
                        <img src="../../img/slider_arrow.svg" alt="">
                    </a>
                </div>
                <div class="setting-child__name">
                    <p>твое имя</p>
                    <input type="text" placeholder="имя ребенка">
                    <button class="button__blue" disabled>сохранить</button>
                    <a href="#">выйти из аккаунта</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
